services:
  # ═══════════════════════════════════════
  # PostgreSQL + PostGIS
  # ═══════════════════════════════════════
  postgres:
    image: postgis/postgis:16-3.4
    container_name: vovplan-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: vovplan
      POSTGRES_USER: vovplan
      POSTGRES_PASSWORD: vovplan
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vovplan"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # Redis
  # ═══════════════════════════════════════
  redis:
    image: redis:7-alpine
    container_name: vovplan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # MinIO (S3-совместимое хранилище)
  # ═══════════════════════════════════════
  minio:
    image: minio/minio:latest
    container_name: vovplan-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: vovplan
      MINIO_ROOT_PASSWORD: vovplan123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ═══════════════════════════════════════
  # MinIO Init — создание bucket при первом запуске
  # ═══════════════════════════════════════
  minio-init:
    image: minio/mc:latest
    container_name: vovplan-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set vovplan http://minio:9000 vovplan vovplan123;
      mc mb vovplan/vovplan-assets --ignore-existing;
      mc anonymous set download vovplan/vovplan-assets;
      echo 'Bucket vovplan-assets created';
      "
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  minio_data:
