name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx turbo db:generate

      - name: Check schema.prisma ↔ schema.postgres.prisma in sync
        working-directory: packages/backend/prisma
        run: |
          diff <(sed -n '/SHARED SCHEMA BELOW/,$p' schema.prisma) \
               <(sed -n '/SHARED SCHEMA BELOW/,$p' schema.postgres.prisma) \
            || { echo "::error::Схемы разошлись — правьте обе (общая часть после маркера SHARED)"; exit 1; }

      - name: Validate postgres schema
        working-directory: packages/backend
        run: npm run db:validate:pg
        env:
          DATABASE_URL: "postgresql://ci:ci@localhost:5432/ci"

      - name: Create SQLite schema
        run: npm run db:push --workspace packages/backend

      - name: Lint (typecheck)
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
