name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_DB: vovplan_test
          POSTGRES_USER: vovplan
          POSTGRES_PASSWORD: vovplan
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vovplan"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx turbo db:generate
        env:
          DATABASE_URL: "postgresql://vovplan:vovplan@localhost:5432/vovplan_test?schema=public"

      - name: Lint
        run: npm run lint
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: "postgresql://vovplan:vovplan@localhost:5432/vovplan_test?schema=public"
          JWT_SECRET: "ci-test-secret-32-chars-long-xxxxxxx"
